name: Send Cold Outreach Emails

on:
  workflow_dispatch:
    inputs:
      to:
        description: 'Recipient email address'
        required: true
      subject:
        description: 'Email subject'
        required: true
      body:
        description: 'Email body (plain text)'
        required: true
      from_name:
        description: 'Sender name'
        required: false
        default: 'Ben D'

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Send via Resend API (Python)
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO: ${{ github.event.inputs.to }}
          SUBJECT: ${{ github.event.inputs.subject }}
          BODY: ${{ github.event.inputs.body }}
          FROM_NAME: ${{ github.event.inputs.from_name }}
        run: |
          python3 - << 'PYEOF'
          import os, json, urllib.request, urllib.error

          key = os.environ["RESEND_API_KEY"]
          payload = json.dumps({
              "from": f"{os.environ['FROM_NAME']} <ben.d@rivaledge.ai>",
              "to": [os.environ["TO"]],
              "subject": os.environ["SUBJECT"],
              "text": os.environ["BODY"],
          }).encode()

          req = urllib.request.Request(
              "https://api.resend.com/emails",
              data=payload,
              headers={"Authorization": f"Bearer {key}", "Content-Type": "application/json"},
          )
          try:
              with urllib.request.urlopen(req, timeout=15) as r:
                  resp = json.loads(r.read())
                  print(f"✅ Email sent! ID: {resp.get('id')}")
                  print(f"   To: {os.environ['TO']}")
          except urllib.error.HTTPError as e:
              print(f"❌ Failed: {e.code} {e.read().decode()[:200]}")
              exit(1)
          PYEOF
