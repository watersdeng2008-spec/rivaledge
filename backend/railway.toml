[build]
builder = "dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
startCommand = "sh -c 'uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}'"

[[cron]]
name = "onboarding-email"
schedule = "*/30 * * * *"
command = "python -m cron.onboarding_email"

[[cron]]
name = "sales-agent-daily"
schedule = "0 14 * * *"  # 9:00 AM CST (14:00 UTC)
command = "python -m cron.sales_agent_cron 10"

[[cron]]
name = "automated-emails"
schedule = "0 9 * * 1" # Every Monday at 9:00 AM UTC (4:00 AM CST)
command = "python cron/automated_emails.py"

[[cron]]
name = "posthog-monitor"
schedule = "0 */4 * * *"  # Every 4 hours
command = "python -m cron.posthog_monitor"
